name: Guard Main Branch (Experimental-only Paths)

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  guard-main:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Block experimental-only paths from main
        run: |
          set -euo pipefail

          # Guard checks will be added here as new experimental-only paths are introduced
          true
